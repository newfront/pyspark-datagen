syntax = "proto3";

package game.v1;

import "buf/validate/validate.proto";

option java_multiple_files = true;
option java_outer_classname = "GameProto";
option java_package = "com.example.game.v1";

// Game represents a title that can appear on a leaderboard (e.g. Steam-style).
message Game {
  string uuid = 1 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true
  ];
  string name = 2 [(buf.validate.field).string = { min_len: 1, max_len: 256 }];
  string genre = 3 [(buf.validate.field).string = { max_len: 64 }];  // e.g. "Action", "RPG"
  uint64 released_at = 4 [(buf.validate.field).required = true];  // Unix seconds when game released
}
